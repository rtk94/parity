name: Android CI

on:
  push:
    branches: ["main", "claude/**"]
    paths: ["android/**", ".github/workflows/android.yml"]
  # Runs on every PR to main (no path filter) so it can serve as a
  # required status check without deadlocking non-Android PRs.
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: parity-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Upload unit test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: android/app/build/reports/tests/
